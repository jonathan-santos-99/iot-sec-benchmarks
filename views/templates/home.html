{{define "title"}}Dashboard{{end}}

{{define "content"}}
<section class="chart-panel">
    <h2>Requests por segundo</h2>
    <div class="chart-wrapper">
        <canvas id="rpsChart"></canvas>
    </div>
</section>

<script>
    (function renderRpsChart() {
        if (typeof Chart === 'undefined') {
            return setTimeout(renderRpsChart, 50);
        }

        const canvas = document.getElementById('rpsChart');
        if (!canvas) return;

        const PALETTE = [
            { border: '#2563eb', bg: 'rgba( 37,  99, 235, 0.15)' },
            { border: '#dc2626', bg: 'rgba(220,  38,  38, 0.15)' },
            { border: '#16a34a', bg: 'rgba( 22, 163,  74, 0.15)' },
            { border: '#9333ea', bg: 'rgba(147,  51, 234, 0.15)' },
            { border: '#ea580c', bg: 'rgba(234,  88,  12, 0.15)' },
        ];

        const chart = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: { labels: [], datasets: [] },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { position: 'bottom' },
                    title: { display: false },
                },
                scales: {
                    x: { title: { display: true, text: 'Tempo' } },
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: 'Requests' },
                    },
                },
            },
        });

        function datasetFor(type, index) {
            let ds = chart.data.datasets.find((d) => d.label === type);
            if (ds) return ds;

            const color = PALETTE[index % PALETTE.length];
            ds = {
                label: type,
                data: [],
                borderColor: color.border,
                backgroundColor: color.bg,
                tension: 0.3,
                fill: false,
            };
            chart.data.datasets.push(ds);
            return ds;
        }

        function applyMetrics(payload) {
            const series = payload.data
            if (series.length === 0) return;

            const maxLen = series.reduce((acc, s) => Math.max(acc, s.requests_per_second.length), 0);
            chart.data.labels = Array.from({ length: maxLen }, (_, i) => `${i + 1}s`);

            series.forEach((entry, i) => {
                const ds = datasetFor(entry.type || `serie-${i}`, i);
                ds.data = entry.requests_per_second || [];
            });

            chart.update('none');
        }

        async function fetchMetrics() {
            try {
                const res = await fetch('/metrics', { headers: { 'Accept': 'application/json' } });
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const payload = await res.json();
                applyMetrics(payload);
            } catch (err) {
                console.error('Falha ao buscar /metrics:', err);
            }
        }

        fetchMetrics();
    })();
</script>
{{end}}

{{template "layout" .}}
