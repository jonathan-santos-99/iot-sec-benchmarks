{{define "title"}}Dashboard{{end}}

{{define "pageClass"}}page-dashboard{{end}}

{{define "content"}}
<div class="dashboard-container">
    <h1 class="dashboard-title">Dashboard</h1>
    <div class="charts-grid">
        <section class="chart-panel">
            <h2>Requests por segundo</h2>
            <div class="chart-wrapper">
                <canvas id="rpsChart"></canvas>
            </div>
        </section>

        <section class="chart-panel">
            <h2>Requests por segundo (Checksum)</h2>
            <div class="chart-wrapper">
                <canvas id="rpsChecksumChart"></canvas>
            </div>
        </section>

        <section class="chart-panel">
            <h2>Requests por segundo (TLS)</h2>
            <div class="chart-wrapper">
                <canvas id="rpsTLSChart"></canvas>
            </div>
        </section>

        <section class="chart-panel">
            <h2>Requests por segundo (Checksum+TLS)</h2>
            <div class="chart-wrapper">
                <canvas id="rpsAllChart"></canvas>
            </div>
        </section>

        <section class="chart-panel">
            <h2>RPS médio por algoritmo</h2>
            <div class="chart-wrapper">
                <canvas id="avgRpsChart"></canvas>
            </div>
        </section>

    </div>
</div>

<script>
    (function renderRpsChart() {
        let all = [];
        let tls = [];
        let checkSum = [];
        let encrypt = [];
        let algorithms = [];

        if (typeof Chart === 'undefined') {
            return setTimeout(renderRpsChart, 50);
        }

        const PALETTE = {
            "PLAIN_TEXT" : 'rgba( 37, 99, 235, 1)',
            "CHACHA20"   : 'rgba(220, 38, 38, 1)',
            "AES"        : 'rgba( 22, 163, 74, 1)',
        };

        function createChart(id) {
            const canvas = document.getElementById(id);
            if (!canvas) return;

            return new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { position: 'bottom' },
                        title: { display: false },
                    },
                    scales: {
                        x: { title: { display: true, text: 'Tempo' } },
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: 'Requests' },
                        },
                    },
                },
            });
        }

        function createBarChart(id, yLabel) {
            const canvas = document.getElementById(id);
            if (!canvas) return;

            return new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: { labels: [], datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        title: { display: false },
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: yLabel },
                        },
                    },
                },
            });
        }

        function colorFor(type) {
            return PALETTE[type] || 'rgba(100,116,139,0.15)';
        }

        function avg(arr) {
            if (!arr || arr.length === 0) return 0;
            return arr.reduce((a, b) => a + b, 0) / arr.length;
        }

        function groupByType(data) {
            return data.reduce((acc, e) => {
                const t = e.type || 'UNKNOWN';
                if (acc[t]) {
                    acc[t].push(e);
                } else {
                    acc[t] = [e];
                }
                return acc;
            }, {});
        }

        function renderAvgRps(chart) {
            if (!chart) return;

            const configs = [
                { label: 'Base',              data: encrypt },
                { label: 'Checksum',          data: checkSum},
                { label: 'TLS',               data: tls     },
                { label: 'Checksum + TLS',    data: all     },
            ];

            chart.data.labels = configs.map(c => c.label);
            chart.data.datasets = algorithms.map(t => {
                const c = colorFor(t);
                return {
                    label: t,
                    data: configs.map(cfg => {
                        const entries = cfg.data.filter(e => (e.type || 'UNKNOWN') === t);
                        return avg(entries.map(e => avg(e.requests_per_second)));
                    }),
                    borderColor: c,
                    backgroundColor: c,
                };
            });
            chart.update('none');
        }

        function datasetFor(chart, type, index) {
            let ds = chart.data.datasets.find((d) => d.label === type);
            if (ds) return ds;

            const color = PALETTE[type];
            ds = {
                label: type,
                data: [],
                borderColor: color,
                backgroundColor: color,
                tension: 0.3,
                fill: false,
            };
            chart.data.datasets.push(ds);
            return ds;
        }

        function applyMetrics(series, chart) {
            if (series.length === 0) return;

            const maxLen = series.reduce((acc, s) => Math.max(acc, s.requests_per_second.length), 0);
            chart.data.labels = Array.from({ length: maxLen }, (_, i) => `${i + 1}s`);

            series.forEach((entry, i) => {
                const ds = datasetFor(chart, entry.type || `serie-${i}`, i);
                ds.data = entry.requests_per_second || [];
            });

            chart.update('none');
        }

        const rpsAllChart       = createChart('rpsAllChart');
        const rpsTlsChart       = createChart('rpsTLSChart');
        const rpsChecksumChart  = createChart('rpsChecksumChart');
        const rpsChart          = createChart('rpsChart');
        const avgRpsChart       = createBarChart('avgRpsChart', 'RPS médio');
        const overheadChart     = createBarChart('overheadChart', 'Overhead (%)');

        async function fetchMetrics() {
            try {
                const res = await fetch('/metrics', { headers: { 'Accept': 'application/json' } });
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const payload = await res.json();

                all      = payload.data.filter(r =>  r.checksum &&  r.tls);
                tls      = payload.data.filter(r => !r.checksum &&  r.tls);
                checkSum = payload.data.filter(r =>  r.checksum && !r.tls);
                encrypt  = payload.data.filter(r => !r.checksum && !r.tls);

                algorithms = Object.keys(groupByType(encrypt));

                applyMetrics(all      , rpsAllChart);
                applyMetrics(tls      , rpsTlsChart);
                applyMetrics(checkSum , rpsChecksumChart);
                applyMetrics(encrypt  , rpsChart);

                renderAvgRps(avgRpsChart);
            } catch (err) {
                console.error('Falha ao buscar /metrics:', err);
            }
        }

        fetchMetrics();
    })();
</script>
{{end}}

{{template "layout" .}}
