{{define "title"}}Login{{end}}

{{define "content"}}
<section class="card">
    <form method="post" action="/login">
        <label>
            Usuário
            <input type="text" name="username" placeholder="usuário" value="{{.Username}}" required>
        </label>
        <label>
            Senha
            <input type="password" name="password" placeholder="••••••••" required>
        </label>

        {{if .ErrorMessage}}
        <div id="login-feedback" aria-live="polite">
            <p class="error">{{.ErrorMessage}}</p>
        </div>
        {{end}}

        <button type="submit">
            <span>Entrar</span>
        </button>

    </form>
</section>
{{end}}

{{template "layout" .}}
